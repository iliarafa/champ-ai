<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons - Safari is picky, so we include multiple formats -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/b_icon.png?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="/b_icon.png?v=3" />

    <!-- Note: For best Safari results, place a favicon.ico in /public (generated from b_icon.png) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />

    <!-- iOS specific (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Champ Ai" />

    <!-- iOS Splash Screens removed for now (placeholders were not ideal).
         We can add proper ones later once good splash images are generated. -->
    
    <!-- Primary Meta Tags -->
    <title>Champ Ai — One LLM. One Key. Pure Chat.</title>
    <meta name="title" content="Champ Ai — One LLM. One Key. Pure Chat." />
    <meta name="description" content="A minimal, private chat interface for any OpenAI-compatible LLM. Just bring your own API key." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://champ-ai-ten.vercel.app/" />
    <meta property="og:title" content="Champ Ai — One LLM. One Key. Pure Chat." />
    <meta property="og:description" content="A minimal, private chat interface for any OpenAI-compatible LLM. Just bring your own API key." />
    <meta property="og:image" content="https://champ-ai-ten.vercel.app/b_icon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://champ-ai-ten.vercel.app/" />
    <meta property="twitter:title" content="Champ Ai — One LLM. One Key. Pure Chat." />
    <meta property="twitter:description" content="A minimal, private chat interface for any OpenAI-compatible LLM. Just bring your own API key." />
    <meta property="twitter:image" content="https://champ-ai-ten.vercel.app/b_icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
